interface:
  display_name: "GoLogin Local Browser"
  short_description: "Local GoLogin profile automation"
  default_prompt: "Use $gologin-local-agent-browser-skill to run local GoLogin Orbita sessions for profile warmup, login flows, cookie collection, and persistent browser automation. Require GOLOGIN_TOKEN or GOLOGIN_API_TOKEN before any runtime action; if it is missing, ask the user and stop. If the user did not specify whether to use an existing profile or create/import a new one, ask that explicitly before any profile operation."
